# Google Slides batchUpdate recipes
#
# Copy a recipe, replace the {{PLACEHOLDERS}} with real object IDs and values,
# and pass the list as the `requests_yaml` argument to
# `google_slides_batch_update`. Stack multiple recipes in one call to reduce
# round trips.
#
# Reference: https://developers.google.com/workspace/slides/api/reference/rest/v1/presentations/request
#
# Unit note: Slides API uses EMU (English Metric Units) for sizes. 914400 EMU
# = 1 inch. Most properties accept `PT` (points) as well for convenience; the
# recipes below use PT where available.

# --- Table operations ------------------------------------------------------

# Insert 1 row below a given row index.
- insertTableRows:
    tableObjectId: "{{TABLE_ID}}"
    cellLocation:
      rowIndex: "{{ROW_INDEX}}"
    insertBelow: true
    number: 1

# Insert 1 row above a given row index (use insertBelow: false).
- insertTableRows:
    tableObjectId: "{{TABLE_ID}}"
    cellLocation:
      rowIndex: "{{ROW_INDEX}}"
    insertBelow: false
    number: 1

# Insert 1 column to the right of a given column index.
- insertTableColumns:
    tableObjectId: "{{TABLE_ID}}"
    cellLocation:
      columnIndex: "{{COLUMN_INDEX}}"
    insertRight: true
    number: 1

# Delete a table row.
- deleteTableRow:
    tableObjectId: "{{TABLE_ID}}"
    cellLocation:
      rowIndex: "{{ROW_INDEX}}"

# Delete a table column.
- deleteTableColumn:
    tableObjectId: "{{TABLE_ID}}"
    cellLocation:
      columnIndex: "{{COLUMN_INDEX}}"

# Insert text into a specific cell (use replace_text for global text swaps).
- insertText:
    objectId: "{{TABLE_ID}}"
    cellLocation:
      rowIndex: "{{ROW_INDEX}}"
      columnIndex: "{{COLUMN_INDEX}}"
    text: "{{TEXT}}"
    insertionIndex: 0

# --- Shape / element transforms --------------------------------------------

# Resize an element by 120% (relative — multiplies current transform).
- updatePageElementTransform:
    objectId: "{{ELEMENT_ID}}"
    transform:
      scaleX: 1.2
      scaleY: 1.2
      unit: EMU
    applyMode: RELATIVE

# Move an element by +50pt horizontally, -30pt vertically (relative).
- updatePageElementTransform:
    objectId: "{{ELEMENT_ID}}"
    transform:
      translateX: 50
      translateY: -30
      unit: PT
    applyMode: RELATIVE

# Place an element at absolute coordinates (overwrites position and scale).
- updatePageElementTransform:
    objectId: "{{ELEMENT_ID}}"
    transform:
      scaleX: 1
      scaleY: 1
      translateX: "{{X_PT}}"
      translateY: "{{Y_PT}}"
      unit: PT
    applyMode: ABSOLUTE

# --- Images ----------------------------------------------------------------

# Replace an existing image in place, keeping its position and size.
- replaceImage:
    imageObjectId: "{{IMAGE_ID}}"
    url: "{{NEW_IMAGE_URL}}"
    imageReplaceMethod: CENTER_INSIDE

# CENTER_CROP fills the box (may crop). CENTER_INSIDE fits (may letterbox).
- replaceImage:
    imageObjectId: "{{IMAGE_ID}}"
    url: "{{NEW_IMAGE_URL}}"
    imageReplaceMethod: CENTER_CROP

# Create a new image on a slide (needs position and size).
- createImage:
    url: "{{IMAGE_URL}}"
    elementProperties:
      pageObjectId: "{{SLIDE_ID}}"
      size:
        width: { magnitude: 300, unit: PT }
        height: { magnitude: 200, unit: PT }
      transform:
        scaleX: 1
        scaleY: 1
        translateX: 100
        translateY: 100
        unit: PT

# --- Text style ------------------------------------------------------------

# Change font family for a text range (0-indexed, end exclusive).
- updateTextStyle:
    objectId: "{{SHAPE_ID}}"
    style:
      fontFamily: "{{FONT_NAME}}"
    textRange:
      type: FIXED_RANGE
      startIndex: 0
      endIndex: 10
    fields: fontFamily

# Change color of a text range (RGB, 0..1).
- updateTextStyle:
    objectId: "{{SHAPE_ID}}"
    style:
      foregroundColor:
        opaqueColor:
          rgbColor: { red: 0.8, green: 0.2, blue: 0.2 }
    textRange:
      type: ALL
    fields: foregroundColor

# Make a text range bold.
- updateTextStyle:
    objectId: "{{SHAPE_ID}}"
    style:
      bold: true
    textRange:
      type: ALL
    fields: bold

# --- Slide operations ------------------------------------------------------

# Re-order slides (move a range of slide IDs to a new insertion index).
- updateSlidesPosition:
    slideObjectIds: ["{{SLIDE_ID_A}}", "{{SLIDE_ID_B}}"]
    insertionIndex: 3

# Change the layout used by a slide (rarely needed — most layouts cannot be
# swapped cleanly once placeholders are filled).
- updatePageProperties:
    objectId: "{{SLIDE_ID}}"
    pageProperties:
      pageBackgroundFill:
        solidFill:
          color:
            rgbColor: { red: 1, green: 1, blue: 1 }
    fields: pageBackgroundFill

# Delete an element (shape, image, table) from a slide.
- deleteObject:
    objectId: "{{ELEMENT_ID}}"

# --- Shape appearance ------------------------------------------------------

# Change a shape's fill color.
- updateShapeProperties:
    objectId: "{{SHAPE_ID}}"
    shapeProperties:
      shapeBackgroundFill:
        solidFill:
          color:
            rgbColor: { red: 0.1, green: 0.4, blue: 0.9 }
          alpha: 1.0
    fields: shapeBackgroundFill.solidFill.color

# Remove a shape's outline.
- updateShapeProperties:
    objectId: "{{SHAPE_ID}}"
    shapeProperties:
      outline:
        propertyState: NOT_RENDERED
    fields: outline.propertyState

# --- Notes -----------------------------------------------------------------
#
# Most recipes above are single requests. You can stack them in one YAML
# list; the Slides API applies them in order and rolls back the whole batch
# if any fails.
#
# When chaining operations that depend on earlier results (e.g., duplicate a
# slide, then move it), use two separate tool calls — the reply from the
# first call gives you the new object ID to use in the second.
