name: Auto Label PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-by-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: false

  label-maintainer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add maintainer label
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('.github/maintainers.yml', 'utf8');
            const maintainers = content.match(/^\s*-\s+(.+)$/gm)?.map(l => l.replace(/^\s*-\s+/, '').trim()) || [];
            const author = context.payload.pull_request.user.login;
            if (maintainers.includes(author)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['maintainer']
              });
            }
