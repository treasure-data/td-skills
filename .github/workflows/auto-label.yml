name: Auto Label PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-by-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: false

  label-maintainer:
    runs-on: ubuntu-latest
    steps:
      - name: Add maintainer label
        if: >-
          contains(fromJSON('["xerial", "doryokujin", "wenzhengjiang"]'), github.event.pull_request.user.login)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['maintainer']
            });
